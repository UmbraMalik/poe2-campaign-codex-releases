name: Build GitHub Release

on:
  push:
    tags:
      - "*.*.*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run checks and tests
        run: npm test

      - name: Build distributable
        run: npm run dist:checked
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: PoE2 Act Companion Overlay ${{ github.ref_name }}
          draft: true
          files: |
            release/*.exe
            release/latest.yml
            release/*.blockmap
